# IdleFarm configuration

# Storage backend: "sqlite" (zero-setup, single file in the plugin folder)
# or "mysql" (use the mysql section below).
storage:
  type: sqlite

mysql:
  host: localhost
  port: 3306
  database: idlefarm
  username: root
  password: "password"
  useSSL: false
  pool-size: 10

# How often (in seconds) rewards are paid out to online players.
payout-interval-seconds: 60

# Rewards granted per payout interval to every online player,
# regardless of whether they are AFK or actively playing.
rewards:
  money: 10.0
  exp: 5

# Currency display name used in messages/scoreboard.
currency-name: "Coins"

# Multiplier applied to rewards for players standing in an AFK-designated
# region/world. Set to 1.0 to disable bonus.
afk-bonus-multiplier: 1.0

# Minimum minutes online required before a player shows up on /idle top.
top-min-minutes: 1

claims:
  # Worlds where claiming is allowed. Empty list = any Overworld
  # (NORMAL environment) world.
  worlds: []
  # Money cost per claim.
  residential-cost: 500.0
  production-cost: 1000.0
  # Fraction of the claim cost refunded on unclaim (tier spend never refunds).
  unclaim-refund-ratio: 0.5
  # Baseline production-node cap for players without a node_cap row.
  base-node-cap: 4
  # Max Residential plots a player may claim (building land; the first can
  # be claimed anywhere, extras must touch existing territory).
  residential-cap: 3
  # Convert a production node's type in place: cost + how much of the
  # exploration level survives (0.5 = halved, per spec).
  convert-cost: 750.0
  convert-exploration-keep: 0.5

workers:
  hire-cost: 250.0
  # Virtual worker bag: hired/fused workers land here; when full they
  # overflow into the inventory as tradeable item contracts. Expandable.
  bag:
    base-capacity: 54
    expand-step: 9
    expand-cost: 5000.0
  # Percent chance per rarity; should sum to 100.
  gacha-odds:
    common: 55.0
    uncommon: 27.0
    rare: 12.0
    epic: 5.0
    legendary: 1.0
  # Base-stat roll range per rarity.
  stat-ranges:
    common: {min: 1, max: 10}
    uncommon: {min: 5, max: 18}
    rare: {min: 10, max: 28}
    epic: {min: 18, max: 40}
    legendary: {min: 28, max: 55}
  # Fuse: combine 2 same-rarity workers (any level) and roll to upgrade to
  # the next rarity. Failure consumes both and adds a pity stack that raises
  # the next attempt's chance until it reaches a guaranteed 100%.
  fuse:
    base-chance:
      common: 0.6
      uncommon: 0.4
      rare: 0.25
      epic: 0.12
    # Added to success chance per accumulated fail (0.1 = +10% each).
    pity-per-fail: 0.1
  # EXP needed for next level = base × current level.
  exp-per-level-base: 100
  # Stat points granted per level, randomly allocated.
  points-per-level: 3
  # Chance each point lands on the Trait's favored stat (rest uniform).
  trait-favored-chance: 0.5
  # Player usernames whose skins are rolled for new workers. NPC skins and
  # the contract head texture both resolve from these names.
  skin-pool:
    - Notch
    - jeb_
    - Dinnerbone
    - Grumm
    - dream
    - Technoblade
    - CaptainSparklez
    - DanTDM
    - Ph1LzA
    - TommyInnit

# Map node types to schematic definition ids (files in schematics/).
# Each type may be a single id (used for all tiers) OR a section with
# tier-N keys for per-tier buildings (falls back to the highest defined
# tier at or below the node's tier, then default_hut). Capture buildings
# with /idle admin schem capture, then reference their ids here.
# Example per-tier:
#   mining:
#     tier-1: mining_t1
#     tier-3: mining_t3   # tier 2 keeps tier-1 until you define tier-2
schematics:
  mining: default_hut
  farming: default_hut
  woodcutting: default_hut
  livestock: default_hut
  hunter: default_hut

production:
  # How often (seconds) production accrual is evaluated. Accrual itself is
  # timestamp math, so this only affects update granularity, not totals.
  tick-seconds: 60
  # Buffer capacity = this × node tier. Full buffer stops production.
  buffer-capacity-per-tier: 64
  # Items per hour per node type, before worker power multipliers.
  base-items-per-hour:
    mining: 40
    farming: 48
    woodcutting: 44
    livestock: 36
    hunter: 30
  # Worker power: rarity multiplier × (1 + level × level-power-per-level),
  # then × (1 + diligence/100) per worker.
  rarity-power:
    common: 1.0
    uncommon: 1.3
    rare: 1.7
    epic: 2.2
    legendary: 3.0
  level-power-per-level: 0.02
  # Worker EXP per credited item (split across crew, scaled by Stamina).
  worker-exp-per-item: 2.0
  # Weighted drop tables per node type.
  # Drop tables are bracket-gated: a node uses the highest bracket-N table
  # unlocked by its Exploration Level (bracket = level/bracket-size + 1).
  # Higher brackets are richer, so leveling a node improves its everyday
  # output — not just its exploration events. Edit live via
  # /idle admin pool <type> (bracket picker inside the GUI).
  drop-tables:
    mining:
      bracket-1:
        cobblestone: 60
        coal: 30
        raw_iron: 10
      bracket-2:
        cobblestone: 40
        coal: 28
        raw_iron: 22
        raw_gold: 8
        redstone: 2
      bracket-3:
        coal: 30
        raw_iron: 30
        raw_gold: 18
        redstone: 12
        lapis_lazuli: 7
        diamond: 3
      bracket-4:
        raw_iron: 28
        raw_gold: 24
        redstone: 16
        diamond: 18
        emerald: 10
        ancient_debris: 4
    farming:
      bracket-1:
        wheat: 50
        carrot: 30
        potato: 20
      bracket-2:
        wheat: 35
        carrot: 25
        potato: 25
        beetroot: 12
        pumpkin: 3
      bracket-3:
        carrot: 25
        potato: 25
        beetroot: 20
        melon_slice: 15
        pumpkin: 10
        glow_berries: 5
    woodcutting:
      bracket-1:
        oak_log: 55
        birch_log: 30
        spruce_log: 15
      bracket-2:
        oak_log: 35
        birch_log: 25
        spruce_log: 20
        jungle_log: 12
        acacia_log: 8
      bracket-3:
        spruce_log: 25
        jungle_log: 20
        dark_oak_log: 20
        cherry_log: 20
        mangrove_log: 15
    livestock:
      bracket-1:
        beef: 35
        porkchop: 30
        chicken: 25
        egg: 10
      bracket-2:
        beef: 25
        porkchop: 25
        chicken: 20
        leather: 18
        egg: 8
        wool: 4
      bracket-3:
        beef: 22
        leather: 25
        wool: 18
        milk_bucket: 15
        honey_bottle: 12
        rabbit_foot: 8
    hunter:
      bracket-1:
        rotten_flesh: 40
        bone: 35
        string: 25
      bracket-2:
        bone: 30
        string: 25
        gunpowder: 20
        spider_eye: 15
        arrow: 10
      bracket-3:
        gunpowder: 25
        spider_eye: 20
        ender_pearl: 18
        blaze_rod: 15
        ghast_tear: 12
        wither_skeleton_skull: 10

# Timed multipliers bought with Money; buying while active extends duration.
boosters:
  money:
    cost: 2000.0
    multiplier: 2.0
    duration-minutes: 60
  production:
    cost: 3000.0
    multiplier: 1.5
    duration-minutes: 60

# One-time convenience perks (QoL money sinks).
perks:
  auto_collect-cost: 50000.0
  remote_collect-cost: 20000.0

# Weekly server-wide expedition. Committing a node's idle workers locks
# them (EXPLORING) for the duration and adds their stat total to your
# weekly contribution. Top ranks get Money at week rollover.
expedition:
  commit-duration-minutes: 60
  rewards: [5000.0, 3000.0, 1500.0]

# Daily login streak: bonus = base-money × min(streak days, cap).
streak:
  base-money: 100.0
  max-multiplier-days: 7

warehouse:
  # Starting warehouse capacity (total item count).
  base-capacity: 2000
  # Capacity added per expansion purchase.
  expand-step: 1000
  # Money cost per expansion.
  expand-cost: 5000.0

nodes:
  # Tier upgrade cost = base × factor^(currentTier-1). Exponential per spec.
  tier-base-cost: 1000.0
  tier-cost-factor: 1.8
  # Highest tier a node can reach.
  max-tier: 5
  # Upgrade build time (seconds) = base × target tier. Production continues
  # at the old tier while building.
  build-seconds-base: 60
  # Construction animation speed: ticks between each rising Y-layer (0 = instant).
  build-ticks-per-layer: 4

exploration:
  # How often (seconds) event lifecycle is evaluated (spawn/expiry/completion).
  check-interval-seconds: 30
  # Chance per check that an event spawns at an event-less node whose owner
  # is online.
  spawn-chance-per-check: 0.05
  # Levels per bracket: bracket = level/size + 1.
  bracket-size: 10
  level-cap: 100
  # Exploration EXP needed for next level = base × (level + 1).
  exp-per-level-base: 500
  # Passive exploration EXP per produced item.
  passive-exp-per-item: 1.0
  # Lump exploration EXP for completing an event.
  event-exp-bonus: 2000
  # Outcome grade odds (percent) shifted by team Luck.
  grade-odds:
    jackpot-base: 5
    jackpot-per-luck: 0.1
    great-base: 20
    great-per-luck: 0.2
  grade-multiplier:
    great: 1.8
    jackpot: 3.0
  # Event catalog. min-bracket gates availability; loot uses weighted rolls.
  events:
    abandoned_shaft:
      name: "Abandoned Shaft"
      min-bracket: 1
      duration-minutes: 20
      expiry-minutes: 30
      loot-count-base: 8
      loot:
        iron_ingot: 40
        gold_ingot: 25
        lapis_lazuli: 20
        redstone: 10
        diamond: 5
    lost_caravan:
      name: "Lost Caravan"
      min-bracket: 1
      duration-minutes: 15
      expiry-minutes: 25
      loot-count-base: 10
      loot:
        bread: 35
        leather: 25
        paper: 20
        emerald: 15
        saddle: 5
    deep_ruins:
      name: "Deep Ruins"
      min-bracket: 2
      duration-minutes: 35
      expiry-minutes: 30
      loot-count-base: 10
      loot:
        emerald: 30
        diamond: 25
        amethyst_shard: 20
        experience_bottle: 15
        golden_apple: 8
        enchanted_golden_apple: 2
    ancient_vault:
      name: "Ancient Vault"
      min-bracket: 4
      duration-minutes: 60
      expiry-minutes: 20
      loot-count-base: 12
      loot:
        diamond: 35
        netherite_scrap: 15
        golden_apple: 20
        enchanted_golden_apple: 5
        heavy_core: 1
        emerald_block: 24

# Schematic capture: air blocks farther than this many blocks (chebyshev)
# from any solid block are NOT captured, so pasting a building never
# flattens terrain away from the structure while interiors still carve.
schematics-capture:
  air-padding: 2

npc:
  # How often (ticks) NPC animation behaviors are evaluated.
  animation-interval-ticks: 60
  # Behavior sets referenced by schematic definitions (profiles.<state>).
  # Available behaviors: wander, walk_worksite, return_spawn, depart,
  # hold_tool, clear_tool, swing, look_close, sneak, stand.
  # depart = walk off toward a work anchor and despawn ("gone out to work");
  # the NPC walks back home when the state changes. return_spawn = walk back
  # to the worker's own spawn anchor (bed point) and stay.
  animation-profiles:
    default_working: [hold_tool, depart]
    default_idle: [return_spawn, look_close, clear_tool]
    default_stop: [return_spawn, sneak, clear_tool]
    # EXPLORING workers walk off and stay gone for the whole run.
    default_exploring: [depart]
