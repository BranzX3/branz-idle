# Timed multipliers bought with Money; buying while active extends duration.
boosters:
  money:
    cost: 2000.0
    multiplier: 2.0
    duration-minutes: 60
  production:
    cost: 3000.0
    multiplier: 1.5
    duration-minutes: 60

# One-time convenience perks (QoL money sinks).
perks:
  auto_collect-cost: 50000.0
  remote_collect-cost: 20000.0

# Weekly server-wide expedition. Committing a node's idle workers locks
# them (EXPLORING) for the duration and adds their stat total to your
# weekly contribution. Top ranks get Money at week rollover.
expedition:
  commit-duration-minutes: 60
  rewards: [5000.0, 3000.0, 1500.0]
  weekly-contribution-cap: 10000
  participation-threshold: 250
  participation-reward: 500.0

# Daily login streak: bonus = base-money × min(streak days, cap).
streak:
  base-money: 100.0
  max-multiplier-days: 7

warehouse:
  # Starting warehouse capacity (total item count).
  base-capacity: 2000
  # Capacity added per expansion purchase.
  expand-step: 1000
  # Money cost per expansion.
  expand-cost: 5000.0

nodes:
  # Tier upgrade cost = base × factor^(currentTier-1). Exponential per spec.
  tier-base-cost: 1000.0
  tier-cost-factor: 1.8
  # Highest tier a node can reach.
  max-tier: 5
  # Upgrade build time (seconds) = base × target tier. Production continues
  # at the old tier while building.
  build-seconds-base: 60
  # Construction animation speed: ticks between each rising Y-layer (0 = instant).
  build-ticks-per-layer: 4

exploration:
  # How often (seconds) event lifecycle is evaluated (spawn/expiry/completion).
  check-interval-seconds: 60
  # Chance per check that an event spawns at an event-less node whose owner
  # is online.
  spawn-chance-per-check: 0.02
  max-waiting-events: 3
  preparation-kit-cost: 16
  # Levels per bracket: bracket = level/size + 1.
  bracket-size: 10
  vanilla-brackets: 10
  level-cap: 100
  # Exploration EXP needed for next level = base × (level + 1).
  exp-curve:
    base: 120
    per-level: 12
  # Passive exploration EXP per produced item.
  passive-research:
    base-per-hour: 75.0
    extra-worker-bonus: 0.15
    level-power-per-level: 0.005
    full-buffer-multiplier: 0.25
    daily-cap: 900
    rested-hours: 48
    rarity-factor:
      common: 1.00
      uncommon: 1.05
      rare: 1.10
      epic: 1.15
      legendary: 1.20
  # Lump exploration EXP for completing an event.
  # Daily cadence bonuses are settled by the Focus system on Warehouse claim.
  event-exp-bonus: 0
  # Outcome grade odds (percent) shifted by team Luck.
  grade-odds:
    jackpot-base: 5
    jackpot-per-luck: 0.1
    great-base: 20
    great-per-luck: 0.2
  grade-multiplier:
    great: 1.8
    jackpot: 3.0
  # Event catalog. min-bracket gates availability; loot uses weighted rolls.
  events:
    first_survey:
      name: "First Survey"
      min-bracket: 1
      duration-minutes: 4
      expiry-minutes: 120
      loot-count-base: 8
      loot:
        cobblestone: 40
        oak_log: 30
        wheat: 30
    abandoned_shaft:
      name: "Abandoned Shaft"
      min-bracket: 1
      duration-minutes: 20
      expiry-minutes: 90
      loot-count-base: 8
      loot:
        iron_ingot: 40
        gold_ingot: 25
        lapis_lazuli: 20
        redstone: 10
        diamond: 5
    lost_caravan:
      name: "Lost Caravan"
      min-bracket: 1
      duration-minutes: 15
      expiry-minutes: 90
      loot-count-base: 10
      loot:
        bread: 35
        leather: 25
        paper: 20
        emerald: 15
        saddle: 5
    deep_ruins:
      name: "Deep Ruins"
      min-bracket: 2
      duration-minutes: 35
      expiry-minutes: 90
      loot-count-base: 10
      loot:
        emerald: 30
        diamond: 25
        amethyst_shard: 20
        experience_bottle: 15
        golden_apple: 8
    ancient_vault:
      name: "Ancient Vault"
      min-bracket: 4
      duration-minutes: 60
      expiry-minutes: 90
      loot-count-base: 12
      loot:
        diamond: 35
        netherite_scrap: 15
        golden_apple: 20
        emerald_block: 24

frontier:
  enabled: false
  level-cap: 200
  # Supply is blocked unless all durable sink gates are explicitly enabled.
  sink-gates:
    profession: false
    equipment: false
    repair: false
    project: false

credits:
  coin-offset-per-credit: 20
  max-offset-percent: 15
  season-offset-cap: 30000

season:
  id: preseason
  start-date: "2026-07-20"

projects:
  server:
    material: cobblestone
    target: 100000
    daily-cap: 1024

# Schematic capture: air blocks farther than this many blocks (chebyshev)
# from any solid block are NOT captured, so pasting a building never
# flattens terrain away from the structure while interiors still carve.
schematics-capture:
  air-padding: 2

npc:
  # How often (ticks) NPC animation behaviors are evaluated.
  animation-interval-ticks: 60
  # Behavior sets referenced by schematic definitions (profiles.<state>).
  # Available behaviors: wander, walk_worksite, return_spawn, depart,
  # hold_tool, clear_tool, swing, look_close, sneak, stand.
  # depart = walk off toward a work anchor and despawn ("gone out to work");
  # the NPC walks back home when the state changes. return_spawn = walk back
  # to the worker's own spawn anchor (bed point) and stay.
  animation-profiles:
    default_working: [hold_tool, depart]
    default_idle: [return_spawn, look_close, clear_tool]
    default_stop: [return_spawn, sneak, clear_tool]
    # EXPLORING workers walk off and stay gone for the whole run.
    default_exploring: [depart]
