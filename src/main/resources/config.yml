# IdleFarm configuration

# Storage backend: "sqlite" (zero-setup, single file in the plugin folder)
# or "mysql" (use the mysql section below).
storage:
  type: sqlite

mysql:
  host: localhost
  port: 3306
  database: idlefarm
  username: root
  password: "password"
  useSSL: false
  pool-size: 10

# How often (in seconds) rewards are paid out to online players.
payout-interval-seconds: 60

# Rewards granted per payout interval to every online player,
# regardless of whether they are AFK or actively playing.
rewards:
  money: 10.0
  exp: 5

# Currency display name used in messages/scoreboard.
currency-name: "Coins"

# Multiplier applied to rewards for players standing in an AFK-designated
# region/world. Set to 1.0 to disable bonus.
afk-bonus-multiplier: 1.0

# Minimum minutes online required before a player shows up on /idle top.
top-min-minutes: 1

claims:
  # Worlds where claiming is allowed. Empty list = any Overworld
  # (NORMAL environment) world.
  worlds: []
  # Money cost per claim.
  residential-cost: 500.0
  production-cost: 1000.0
  # Fraction of the claim cost refunded on unclaim (tier spend never refunds).
  unclaim-refund-ratio: 0.5
  # Baseline production-node cap for players without a node_cap row.
  base-node-cap: 4

workers:
  hire-cost: 250.0
  # Percent chance per rarity; should sum to 100.
  gacha-odds:
    common: 55.0
    uncommon: 27.0
    rare: 12.0
    epic: 5.0
    legendary: 1.0
  # Base-stat roll range per rarity.
  stat-ranges:
    common: {min: 1, max: 10}
    uncommon: {min: 5, max: 18}
    rare: {min: 10, max: 28}
    epic: {min: 18, max: 40}
    legendary: {min: 28, max: 55}
  # Same-rarity workers consumed per fuse (result: next rarity).
  fuse-count: 3
  # Player usernames whose skins are rolled for new workers. NPC skins and
  # the contract head texture both resolve from these names.
  skin-pool:
    - Notch
    - jeb_
    - Dinnerbone
    - Grumm
    - dream
    - Technoblade
    - CaptainSparklez
    - DanTDM
    - Ph1LzA
    - TommyInnit

# Map node types to schematic definition ids (files in schematics/).
# Unlisted types use default_hut.
schematics:
  mining: default_hut
  farming: default_hut
  woodcutting: default_hut
  livestock: default_hut
  hunter: default_hut

npc:
  # How often (ticks) NPC animation behaviors are evaluated.
  animation-interval-ticks: 60
  # Behavior sets referenced by schematic definitions (profiles.<state>).
  # Available behaviors: wander, walk_worksite, return_spawn, depart,
  # hold_tool, clear_tool, swing, look_close, sneak, stand.
  # depart = walk off toward a work anchor and despawn ("gone out to work");
  # the NPC walks back home when the state changes. return_spawn = walk back
  # to the worker's own spawn anchor (bed point) and stay.
  animation-profiles:
    default_working: [hold_tool, depart]
    default_idle: [return_spawn, look_close, clear_tool]
    default_stop: [return_spawn, sneak, clear_tool]
