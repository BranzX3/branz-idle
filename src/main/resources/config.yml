# Timed multipliers bought with Money; buying while active extends duration.
boosters:
  money:
    cost: 2000.0
    multiplier: 2.0
    duration-minutes: 60
  production:
    cost: 3000.0
    multiplier: 1.5
    duration-minutes: 60

# One-time convenience perks (QoL money sinks).
perks:
  auto_collect-cost: 50000.0
  remote_collect-cost: 20000.0

# Weekly server-wide expedition. Committing a node's idle workers locks
# them (EXPLORING) for the duration and adds their stat total to your
# weekly contribution. Top ranks get Money at week rollover.
expedition:
  commit-duration-minutes: 60
  rewards: [5000.0, 3000.0, 1500.0]
  weekly-contribution-cap: 10000
  # Every reached band pays out at weekly settlement; rank rewards remain
  # modest and additive. Bands never contain exclusive production power.
  participation-bands:
    - id: participant
      name: "Participant"
      threshold: 250
      coins: 500.0
    - id: contributor
      name: "Contributor"
      threshold: 1000
      coins: 750.0
    - id: pathfinder
      name: "Pathfinder"
      threshold: 2500
      coins: 1000.0
    - id: vanguard
      name: "Vanguard"
      threshold: 5000
      coins: 1250.0
  # Legacy single-band fallback when the expedition-bands feature is disabled.
  participation-threshold: 250
  participation-reward: 500.0

# Daily login streak: bonus = base-money × min(streak days, cap).
streak:
  base-money: 100.0
  max-multiplier-days: 7

warehouse:
  # Vault (discovery lane) capacity: rolled finds, rares, event loot. Small on
  # purpose — scarcity here is the reward, and the discovery lane produces in
  # the tens per hour.
  base-capacity: 2000
  # Vault capacity added per expansion purchase.
  expand-step: 1000
  # Money cost per expansion. One purchase raises BOTH pools.
  expand-cost: 5000.0
  # Silo (bulk lane) capacity: family commons, kept apart from the Vault so
  # high-volume cobblestone can never crowd out a diamond. Sized against the
  # lane it serves (docs/BALANCE_BIBLE.md §3): a midgame Tier-5 mining node
  # with five Rare Lv.50 workers produces ~2,900/hour, so the base holds
  # roughly a day and a half of one strong node.
  silo:
    base-capacity: 120000
    # Silo capacity added by the same expansion purchase as the Vault.
    expand-step: 20000

nodes:
  # Tier upgrade cost = base × factor^(currentTier-1). Exponential per spec.
  tier-base-cost: 1000.0
  tier-cost-factor: 1.8
  # Highest tier a node can reach.
  max-tier: 5
  # Upgrade build time (seconds) = base × target tier. Production continues
  # at the old tier while building.
  build-seconds-base: 60
  # Construction animation speed: ticks between each rising Y-layer (0 = instant).
  build-ticks-per-layer: 4
  # Blocks written per tick when a build is too large to place at once. Jobs
  # at or under this size still run immediately, so ordinary huts are
  # unaffected. Lower it if large skins cause a stutter; raise it to make big
  # buildings appear faster on a server with headroom.
  paste-budget-per-tick: 800
  upgrade-site:
    # Show a progress display and construction effects over a node while its
    # tier upgrade runs. Purely visual: nothing is persisted and no world
    # block is touched, so disabling it mid-upgrade is safe.
    enabled: true
    # Seconds between bursts of construction particles and sound.
    effect-seconds: 3
  # Cost to re-orient a placed building. Rotation restores the terrain and
  # re-pastes the whole building, so it is priced to discourage spamming.
  # Set to 0 to make rotation free.
  rotate-cost: 100.0
  placement:
    # Blocks of extra height above the building that are cleared of
    # vegetation, so overhanging tree canopy is removed instead of being
    # left floating over the roof. Everything cleared is recorded in the
    # node's terrain snapshot and comes back on unclaim.
    clear-headroom: 6
  preview:
    # Show a client-side ghost of the building before a production claim is
    # charged. No blocks are written until the player confirms.
    enabled: true
    # Seconds a preview stays open before it cancels itself.
    timeout-seconds: 60
    # How often ghosts are resent; a chunk reload makes the client redraw the
    # real blocks, which would otherwise make the preview vanish silently.
    refresh-seconds: 5
    # Material drawn instead of the real block data, so a preview can never be
    # mistaken for a finished building. Set to NONE to preview real blocks.
    ghost-material: LIGHT_BLUE_STAINED_GLASS
    # Marks solid blocks that overlap the building and will NOT be cleared.
    obstruction-material: RED_STAINED_GLASS

exploration:
  # How often (seconds) event lifecycle is evaluated (spawn/expiry/completion).
  check-interval-seconds: 60
  # Chance per check that an event spawns at an event-less node whose owner
  # is online.
  spawn-chance-per-check: 0.02
  max-waiting-events: 3
  # Bulk commons are now abundant (docs/BALANCE_BIBLE.md §3); the kit stays a
  # meaningful recurring commons sink rather than a rounding error.
  preparation-kit-cost: 128
  # Levels per bracket: bracket = level/size + 1.
  bracket-size: 10
  vanilla-brackets: 10
  level-cap: 100
  # Automatic launch progression stops at level-cap. Admins may manually
  # stage and test future brackets up to this ceiling before enabling them.
  admin-level-cap: 1000
  max-brackets: 100
  # Exploration EXP needed for next level = base × (level + 1).
  exp-curve:
    base: 120
    per-level: 12
  # Passive exploration EXP per produced item.
  passive-research:
    base-per-hour: 75.0
    extra-worker-bonus: 0.15
    level-power-per-level: 0.005
    full-buffer-multiplier: 0.25
    daily-cap: 900
    rested-hours: 48
    rarity-factor:
      common: 1.00
      uncommon: 1.05
      rare: 1.10
      epic: 1.15
      legendary: 1.20
  # Lump exploration EXP for completing an event.
  # Daily cadence bonuses are settled by the Focus system on Warehouse claim.
  event-exp-bonus: 0
  # Outcome grade odds (percent) shifted by team Luck.
  grade-odds:
    jackpot-base: 5
    jackpot-per-luck: 0.1
    great-base: 20
    great-per-luck: 0.2
  grade-multiplier:
    great: 1.8
    jackpot: 3.0
  # Event catalog. min-bracket gates availability; loot uses weighted rolls.
  events:
    first_survey:
      name: "First Survey"
      min-bracket: 1
      duration-minutes: 4
      expiry-minutes: 120
      loot-count-base: 8
      loot:
        cobblestone: 40
        oak_log: 30
        wheat: 30
    abandoned_shaft:
      name: "Abandoned Shaft"
      min-bracket: 1
      duration-minutes: 20
      expiry-minutes: 90
      loot-count-base: 8
      loot:
        iron_ingot: 40
        gold_ingot: 25
        lapis_lazuli: 20
        redstone: 10
        diamond: 5
    lost_caravan:
      name: "Lost Caravan"
      min-bracket: 1
      duration-minutes: 15
      expiry-minutes: 90
      loot-count-base: 10
      loot:
        bread: 35
        leather: 25
        paper: 20
        emerald: 15
        saddle: 5
    deep_ruins:
      name: "Deep Ruins"
      min-bracket: 2
      duration-minutes: 35
      expiry-minutes: 90
      loot-count-base: 10
      loot:
        emerald: 30
        diamond: 25
        amethyst_shard: 20
        experience_bottle: 15
        golden_apple: 8
    ancient_vault:
      name: "Ancient Vault"
      min-bracket: 4
      duration-minutes: 60
      expiry-minutes: 90
      loot-count-base: 12
      loot:
        diamond: 35
        netherite_scrap: 15
        golden_apple: 20
        emerald_block: 24

frontier:
  enabled: false
  level-cap: 200
  material-monthly-cap: 10000
  profession-exp-per-material: 10
  equipment:
    items-per-durability: 25
    repair-per-material: 25
    tier-1: { craft-cost: 12, durability: 500, production-bonus: 0.02 }
    tier-2: { craft-cost: 24, durability: 900, production-bonus: 0.04 }
    tier-3: { craft-cost: 40, durability: 1500, production-bonus: 0.07 }
  # Optional per-material overrides:
  # materials:
  #   aether_ore:
  #     monthly-cap: 10000
  # Supply is blocked unless all durable sink gates are explicitly enabled.
  sink-gates:
    profession: false
    equipment: false
    repair: false
    project: false

credits:
  coin-offset-per-credit: 20
  max-offset-percent: 15
  season-offset-cap: 30000

# Admin economy-dashboard alert thresholds. Alerts are observational only;
# they never delete inventory or alter balances automatically.
economy:
  alerts:
    max-total-coins: 1000000000
    max-player-balance: 10000000
    min-material-sink-ratio: 0.10
    max-rare-cap-hits-7d: 100
    min-expedition-commits-7d: 3
    min-season-objective-completions-7d: 2
    max-claim-failures-7d: 10
    max-catch-up-claims-7d: 250
    # Push a chat line to online admins holding idle.admin.metrics when a
    # threshold above is first breached, and once more when it recovers.
    # Without this the dashboard only answers admins who go and look.
    broadcast: true
    sweep-minutes: 15

season:
  id: preseason
  start-date: "2026-07-20"
  duration-weeks: 12
  modifier-rotation:
    - LONG_ROUTES
    - UNSTABLE_VEINS
    - RESEARCH_WEEK
    - MIXED_CREWS
    - SUPPLY_SHORTAGE
  # Per-week entries override the rotation and provide player-facing cadence.
  weeks:
    1: { phase: Discovery, modifier: LONG_ROUTES, event-family: ROUTES, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    2: { phase: Discovery, modifier: UNSTABLE_VEINS, event-family: VEINS, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    3: { phase: Development, modifier: RESEARCH_WEEK, event-family: RESEARCH, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    4: { phase: Development, modifier: MIXED_CREWS, event-family: CREWS, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    5: { phase: Development, modifier: SUPPLY_SHORTAGE, event-family: SUPPLY, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    6: { phase: Midseason, modifier: LONG_ROUTES, event-family: MIDSEASON, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    7: { phase: Mastery, modifier: UNSTABLE_VEINS, event-family: MASTERY, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    8: { phase: Mastery, modifier: RESEARCH_WEEK, event-family: MASTERY, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    9: { phase: Mastery, modifier: MIXED_CREWS, event-family: MASTERY, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    10: { phase: Finale, modifier: SUPPLY_SHORTAGE, event-family: FINALE, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    11: { phase: Finale, modifier: LONG_ROUTES, event-family: FINALE, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }
    12: { phase: Celebration, modifier: MIXED_CREWS, event-family: CELEBRATION, bonus-window: "Fri 18:00–Sun 23:59 Asia/Bangkok" }

live-ops:
  catch-up:
    weekly-objectives: true
  features:
    # Safe kill switch: stops future Frontier rolls/crafting for the assigned
    # cohort. Existing Warehouse materials and equipped items are retained.
    frontier:
      enabled: false
      rollout-percent: 0
      allowlist: []
    frontier-drops:
      enabled: false
      rollout-percent: 0
      allowlist: []
    seasonal-chronicle:
      enabled: true
      rollout-percent: 100
      allowlist: []
    expedition-bands:
      enabled: true
      rollout-percent: 100
      allowlist: []
  # Experiments may change presentation only. Assignment is stable by UUID.
  experiments:
    chronicle-layout:
      enabled: false
      rollout-percent: 0
      variants:
        control: 50
        objectives-first: 50

projects:
  # Personal Settlement Projects. Targets for commons materials (logs, stone)
  # are scaled to the bulk lane (docs/BALANCE_BIBLE.md §3); the Expedition Dock
  # uses Wool, a discovery-lane material, so its target stays hand-paced.
  personal:
    storehouse:
      name: "Expanded Storehouse"
      material: OAK_LOG
      target: 4096
    expedition_dock:
      name: "Expedition Dock"
      material: WOOL
      target: 384
    chronicle_hall:
      name: "Chronicle Hall"
      material: STONE
      target: 8192
  server:
    material: cobblestone
    # Community-scale commons sink: scaled with the bulk lane so one player's
    # far larger output cannot trivially cap the daily contribution.
    target: 800000
    daily-cap: 8192

# Schematic capture: air blocks farther than this many blocks (chebyshev)
# from any solid block are NOT captured, so pasting a building never
# flattens terrain away from the structure while interiors still carve.
schematics-capture:
  air-padding: 2

npc:
  # How often (ticks) NPC animation behaviors are evaluated.
  animation-interval-ticks: 60
  # Behavior sets referenced by schematic definitions (profiles.<state>).
  # Available behaviors: wander, walk_worksite, return_spawn, depart,
  # hold_tool, clear_tool, swing, look_close, sneak, stand.
  # depart = walk off toward a work anchor and despawn ("gone out to work");
  # the NPC walks back home when the state changes. return_spawn = walk back
  # to the worker's own spawn anchor (bed point) and stay.
  animation-profiles:
    default_working: [hold_tool, depart]
    default_idle: [return_spawn, look_close, clear_tool]
    default_stop: [return_spawn, sneak, clear_tool]
    # EXPLORING workers walk off and stay gone for the whole run.
    default_exploring: [depart]
