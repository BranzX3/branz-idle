# Idle configuration

# Player-facing text is loaded from lang/<language>.yml in the plugin folder.
# "en" ships with the plugin; add your own file to translate. Any key missing
# from your file falls back to the bundled English value.
language: en

# Retention nudges. The streak reminder DMs players (via the Discord front-end)
# whose login streak is alive but who have not logged in yet today. Only players
# with a linked Discord are reached; it fires at most once per player per day.
retention:
  streak-reminder:
    enabled: true
    hour: 20          # hour of day (0-23, Asia/Bangkok) to send reminders
    min-streak: 2     # don't nag brand-new (day-1) streaks

# Permanent hotbar access to the platform-appropriate Idle UI.
menu-item:
  enabled: true
  # Bukkit hotbar index, 0-8. The default is the right-most slot.
  slot: 8
  material: COMPASS
  repair-interval-ticks: 100

# Storage backend: "sqlite" (zero-setup, single file in the plugin folder)
# or "mysql" (use the mysql section below).
storage:
  type: sqlite

vault:
  # Publish Idle Coins as the server's Vault economy, so shops, jobs and other
  # plugins spend the same currency the player earns here. Idle owns the
  # balance: its costs are charged inside the same database transaction as the
  # claim or hire they pay for, which an external economy plugin could not
  # take part in.
  #
  # On a Velocity network every backend must point at ONE shared MySQL
  # database (storage.type: mysql), or each server hands out its own balances.
  #
  # Set to false to keep Coins private to this plugin.
  provide: true

mysql:
  host: localhost
  port: 3306
  database: idle
  username: root
  password: "password"
  useSSL: false
  # Required by MySQL 8 when useSSL is false and the account uses the default
  # caching_sha2_password plugin, otherwise the driver reports
  # "Public Key Retrieval is not allowed". Only enable it on a network you
  # trust, or turn useSSL on instead.
  allow-public-key-retrieval: false
  pool-size: 10

# How often (in seconds) rewards are paid out to online players.
payout-interval-seconds: 60

# Rewards granted per payout interval to every online player,
# regardless of whether they are AFK or actively playing.
rewards:
  money: 10.0
  exp: 5

# Currency display name used in messages/scoreboard.
currency-name: "Coins"

# Central reward catalog used by gameplay settlement and UI descriptions.
# Keep changes aligned with docs/BALANCE_BIBLE.md and the 28-32 day target.
progression:
  rewards:
    starter-node-exp: 300
    first-collection-exp: 100
    first-expedition-exp: 700
    extra-expedition-exp: 100
    extra-expeditions-per-day: 3
    focus-commission-exp: 400
    behavior-commission-coins: 600
    supply-commission-chronicle-points: 3
    weekly-chapter-exp: 3500
    weekly-chapter-coins: 2000
    catchup-commission-exp: 200

# Worlds this plugin operates in. Outside them there are no commands, no
# menus, no worker NPCs and no idle payouts. Claim protection is the one
# exception: land already claimed stays protected even if its world is later
# removed here, so dropping a world cannot open old claims up to griefing.
# Empty list = every Overworld (NORMAL environment) world.
#   worlds:
#     - idle_world
worlds: []

# Multiplier applied to rewards for players standing in an AFK-designated
# region/world. Set to 1.0 to disable bonus.
afk-bonus-multiplier: 1.0

# Minimum minutes online required before a player shows up on /idle top.
top-min-minutes: 1

claims:
  # Deprecated: use the root-level `worlds` list above, which gates the whole
  # plugin instead of only claiming. Still read when `worlds` is empty, so old
  # configs keep working.
  worlds: []
  # Money cost of a player's FIRST claim of each category.
  residential-cost: 500.0
  production-cost: 1000.0
  # Each further claim of that category multiplies the price:
  #   cost = base x factor ^ (claims already held)
  # Rising prices are what limit a sprawling territory, instead of a hard
  # cap — a player may keep expanding as long as they can pay, and the
  # decision between going wide and going deep stays meaningful.
  # Production at 1.6: 1000, 1600, 2560, 4096, 6554, 10486, 16777, 26844...
  production-cost-factor: 1.6
  # Residential rises gently because a 3x3 Complex alone eats 8 plots:
  # 500, 575, 661, 760, 874, 1005, 1156, 1330, 1529...
  residential-cost-factor: 1.15
  # Fraction of the claim cost refunded on unclaim (tier spend never refunds).
  # Refunds price the claim being given back, not the next one up, so
  # churning claims can never turn a profit.
  unclaim-refund-ratio: 0.5
  # Baseline production-node cap for players without a node_cap row.
  # Production nodes are the economy: rare-resource caps, buffers and worker
  # NPC counts all scale with this number, so it stays small. Complexes do
  # NOT consume it — they are built from Residential plots.
  base-node-cap: 6
  # Max Residential plots a player may claim. Residential produces nothing,
  # so this is building land and Complex floor space only — raising it costs
  # world space and Coins, never economy balance.
  # A single 3x3 Complex spends 8 plots; 48 leaves room for several
  # Complexes plus plots kept free to build on.
  residential-cap: 48
  # Convert a production node's type in place: cost + how much of the
  # exploration level survives (0.5 = halved, per spec).
  convert-cost: 750.0
  convert-exploration-keep: 0.5

workers:
  hire-cost: 250.0
  # Virtual worker bag: hired/fused workers land here; when full they
  # overflow into the inventory as tradeable item contracts. Expandable.
  bag:
    base-capacity: 54
    expand-step: 9
    expand-cost: 5000.0
  # Percent chance per rarity; should sum to 100.
  gacha-odds:
    common: 55.0
    uncommon: 27.0
    rare: 12.0
    epic: 5.0
    legendary: 1.0
  # Base-stat roll range per rarity.
  stat-ranges:
    common: {min: 1, max: 10}
    uncommon: {min: 5, max: 18}
    rare: {min: 10, max: 28}
    epic: {min: 18, max: 40}
    legendary: {min: 28, max: 55}
  # Fuse: combine 2 same-rarity workers (any level) and roll to upgrade to
  # the next rarity. Failure consumes both and adds a pity stack that raises
  # the next attempt's chance until it reaches a guaranteed 100%.
  fuse:
    base-chance:
      common: 0.6
      uncommon: 0.4
      rare: 0.25
      epic: 0.12
    # Added to success chance per accumulated fail (0.1 = +10% each).
    pity-per-fail: 0.1
  # EXP needed for next level = base × current level.
  exp-per-level-base: 100
  # Stat points granted per level, randomly allocated.
  points-per-level: 3
  # Chance each point lands on the Trait's favored stat (rest uniform).
  trait-favored-chance: 0.5
  # Player usernames whose skins are rolled for new workers. NPC skins and
  # the contract head texture both resolve from these names.
  skin-pool:
    - Notch
    - jeb_
    - Dinnerbone
    - Grumm
    - dream
    - Technoblade
    - CaptainSparklez
    - DanTDM
    - Ph1LzA
    - TommyInnit

# Map node types to schematic definition ids (files in schematics/).
# Each type may be a single id (used for all tiers) OR a section with
# tier-N keys for per-tier buildings (falls back to the highest defined
# tier at or below the node's tier, then default_hut). Capture buildings
# with /idle admin schem capture, then reference their ids here.
# Example per-tier:
#   mining:
#     tier-1: mining_t1
#     tier-3: mining_t3   # tier 2 keeps tier-1 until you define tier-2
schematics:
  mining: default_hut
  farming: default_hut
  woodcutting: default_hut
  livestock: default_hut
  hunter: default_hut

complex:
  # Merge a production node with adjacent Residential plots so one building
  # spans several chunks. Purely visual: a Complex never changes production,
  # buffers, workers, or rare caps (docs/NODE_MERGE_AND_COMPLEX.md §3).
  # That invariant is what makes the number of Complexes safe to leave
  # uncapped — do not attach a yield bonus here.
  enabled: true
  # Cost per Residential plot spent. A 3x3 needs 8, so it is the late-game
  # Coin sink: expensive, and it returns no power at all.
  cost-per-chunk: 5000.0

skins:
  # Ship a sample 2x1 Complex skin ("demo_lodge") so merging can be tested
  # before any player-authored Complex exists. Files are only written when
  # missing. Set false and delete schematics/demo_lodge_c*.yml plus
  # skins/demo_lodge.yml on a server that does not want it.
  install-demo: true
  # Player build submissions for the skin contest. Close this between events.
  submissions-open: true
  # A submission must fit one chunk when centred on the chunk's middle column,
  # and stays odd-sized so it can rotate about that column.
  max-size: 15
  # Towers are allowed by design; the block budget bounds the real cost.
  max-height: 100
  # Non-air blocks. Raise once the budgeted paste is proven on the live server.
  max-blocks: 6000

production:
  # How often (seconds) production accrual is evaluated. Accrual itself is
  # timestamp math, so this only affects update granularity, not totals.
  tick-seconds: 60
  # Buffer capacity = this × node tier. Full buffer stops production.
  buffer-capacity-per-tier: 256
  # Items per hour per node type, before worker power multipliers.
  base-items-per-hour:
    mining: 40
    farming: 48
    woodcutting: 44
    livestock: 36
    hunter: 30
  # Worker power: rarity multiplier × (1 + level × level-power-per-level),
  # then × (1 + diligence/100) per worker.
  rarity-power:
    common: 1.0
    uncommon: 1.3
    rare: 1.7
    epic: 2.2
    legendary: 3.0
  level-power-per-level: 0.02
  # Worker EXP per credited item (split across crew, scaled by Stamina).
  # Bulk-lane commons never grant worker EXP; only discovery items count.
  worker-exp-per-item: 2.0
  # Bulk lane (docs/BALANCE_BIBLE.md §3): deterministic family commons that
  # flow "like a real player gathering", beside the rolled discovery lane.
  # Each node keeps a separate bulk buffer and tick anchor.
  bulk:
    # Items/hour per node type for one Common Lv.1 worker, anchored to
    # active vanilla gathering rates. Set a type to 0 to disable its lane.
    base-per-hour:
      mining: 70
      farming: 45
      woodcutting: 35
      livestock: 18
      hunter: 15
    # Worker rarity mirrors vanilla tool dig speed
    # (wood/stone/iron/diamond/netherite = 2/4/6/8/9, wood = 1).
    rarity-mult:
      common: 1.0
      uncommon: 2.0
      rare: 3.0
      epic: 4.0
      legendary: 4.5
    # Diligence is Efficiency-like on this lane: rate × (1 + factor × dil/100).
    diligence-factor: 2.0
    # Bulk buffer holds this many hours of the node's current bulk rate;
    # higher tiers hold fewer hours so fill time stays 4-8h as crews grow.
    buffer-hours:
      tier-1: 8
      min: 4
    # Family commons and their share of bulk output (weights).
    commons:
      mining:
        cobblestone: 70
        cobbled_deepslate: 20
        andesite: 10
      farming:
        wheat: 40
