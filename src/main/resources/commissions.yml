# Daily commission catalog. The board selects three eligible entries from the
# player's Focused Node level using a deterministic daily seed.
#
# Two-lane note (docs/BALANCE_BIBLE.md §3): the `produce` and `expedition`
# actions count discovery-lane output only, so their targets are unchanged.
# The `collect` and `delivery` actions measure whatever leaves the buffer /
# fills the Warehouse, which now includes the high-volume bulk lane, so those
# targets are scaled up to keep the "≈2 hours of collectable output" intent.
templates:
  produce_basic:
    action: produce
    unlock-level: 3
    target: 64
    target-per-bracket: 16
    description: "Produce resources at your Focused {node} Node"
    reward:
      kind: NODE_EXP
      amount: 400

  collect_safe:
    action: collect
    unlock-level: 3
    target: 512
    target-per-bracket: 128
    description: "Collect output from your Focused {node} Node"
    reward:
      kind: COINS
      amount: 600

  quick_shift:
    action: produce
    unlock-level: 3
    target: 32
    target-per-bracket: 8
    description: "Complete a quick production shift at your Focused Node"
    reward:
      kind: COINS
      amount: 450

  collect_large:
    action: collect
    unlock-level: 10
    target: 1024
    target-per-bracket: 192
    description: "Complete a large collection from your Focused Node"
    reward:
      kind: NODE_EXP
      amount: 500

  crew_action:
    action: crew
    unlock-level: 10
    target: 1
    description: "Assign or rearrange the Focused Node crew"
    reward:
      kind: COINS
      amount: 650

  expedition:
    action: expedition
    unlock-level: 10
    target: 1
    description: "Complete an exploration event at your Focused Node"
    reward:
      kind: NODE_EXP
      amount: 500

  expedition_veteran:
    action: expedition
    unlock-level: 40
    target: 2
    description: "Complete two exploration events at your Focused Node"
    reward:
      kind: COINS
      amount: 900

  delivery:
    action: delivery
    unlock-level: 20
    target: 512
    target-per-bracket: 64
    description: "Deliver a mixed unlocked-resource bundle"
    reward:
      kind: CHRONICLE_POINTS
      amount: 3

  production_push:
    action: produce
    unlock-level: 30
    target: 256
    target-per-bracket: 32
    description: "Run an extended production shift at your Focused Node"
    reward:
      kind: COINS
      amount: 850
