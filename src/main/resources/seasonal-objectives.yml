# Objectives remain available after their week unlocks until the season ends.
# Supported actions are emitted by authoritative gameplay settlements.
objectives:
  discovery_supplies:
    week: 1
    name: "Stock the Trail"
    description: "Collect 256 items from Production Nodes."
    action: collect
    target: 256
    points: 10
    reward: "Discovery Week banner"
  discovery_routes:
    week: 2
    name: "Chart New Routes"
    description: "Complete 3 exploration events."
    action: exploration
    target: 3
    points: 10
    reward: "Trailblazer display token"
  development_commissions:
    week: 3
    name: "Settlement Routine"
    description: "Claim 5 daily commissions."
    action: commission
    target: 5
    points: 12
    reward: "Development Week banner"
  development_project:
    week: 4
    name: "Raise the Monument"
    description: "Contribute 512 materials to the Server Project."
    action: server_project
    target: 512
    points: 12
    reward: "Builder display token"
  development_expedition:
    week: 5
    name: "Answer the Call"
    description: "Commit to the Global Expedition twice."
    action: expedition_commit
    target: 2
    points: 12
    reward: "Expedition pennant"
  midseason_variety:
    week: 6
    name: "Midseason Survey"
    description: "Complete 5 exploration events."
    action: exploration
    target: 5
    points: 15
    reward: "Midseason title token"
  mastery_production:
    week: 7
    name: "Master Supply"
    description: "Produce 1,000 items."
    action: produce
    target: 1000
    points: 15
    reward: "Mastery Week banner"
  mastery_commissions:
    week: 8
    name: "Trusted Coordinator"
    description: "Claim 7 daily commissions."
    action: commission
    target: 7
    points: 15
    reward: "Coordinator display token"
  mastery_expedition:
    week: 9
    name: "Expedition Veteran"
    description: "Commit to the Global Expedition 3 times."
    action: expedition_commit
    target: 3
    points: 15
    reward: "Veteran pennant"
  finale_project:
    week: 10
    name: "Finale Foundation"
    description: "Contribute 768 materials to the Server Project."
    action: server_project
    target: 768
    points: 18
    reward: "Finale monument token"
  finale_routes:
    week: 11
    name: "One Last Journey"
    description: "Complete 7 exploration events."
    action: exploration
    target: 7
    points: 18
    reward: "Finale trail effect token"
  celebration:
    week: 12
    name: "Season Celebration"
    description: "Collect 512 items from Production Nodes."
    action: collect
    target: 512
    points: 18
    reward: "Season participant title"

reward-track:
  bronze:
    points: 20
    name: "Season Bronze"
    reward: "Bronze seasonal facade"
  silver:
    points: 60
    name: "Season Silver"
    reward: "Silver seasonal title"
  gold:
    points: 120
    name: "Season Gold"
    reward: "Gold seasonal facade"
  chronicle:
    points: 170
    name: "Season Chronicler"
    reward: "Season Chronicler title"
