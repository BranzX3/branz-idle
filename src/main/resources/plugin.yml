name: Idle
version: '${version}'
main: dev.branzx.idle.IdlePlugin
api-version: '26.2'
depend: [Citizens]
softdepend: [floodgate]
author: BranzX3
description: Idle/AFK currency & EXP farming plugin

commands:
  idle:
    description: Idle main command
    usage: /idle [help|command]
    aliases: [afk, idle]

permissions:
  idle.admin:
    description: Allows use of /idle admin subcommands
    default: op
    children:
      idle.admin.operations: true
      idle.admin.content: true
      idle.admin.economy: true
      idle.admin.audit: true
  idle.admin.operations:
    description: Node, event, NPC and maintenance operations
    default: op
  idle.admin.content:
    description: Content validation, pools and schematic authoring
    default: op
  idle.admin.economy:
    description: Balance, Credits and node-cap adjustments
    default: op
  idle.admin.audit:
    description: Audit logs and system metrics
    default: op
  idle.skin:
    description: Allows changing worker skins (/idle skin) - rank perk
    default: op
