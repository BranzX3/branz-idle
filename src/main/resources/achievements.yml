# Pioneer Chronicle achievement catalog.
#
# category: JOURNEY | MASTERY | DISCOVERY | WORKER | TERRITORY | EXPEDITION | SOCIAL | FEAT
# hidden: true -> a Feat that stays invisible until earned.
# requires: account counters that auto-complete the achievement when every
#   threshold is reached. Achievements without requires are completed directly
#   by a gameplay event in code.
# reward-coins: optional one-time Coin grant on claim (never Credits).
#
# Counter reference (fed by GameDesignService):
#   produced_total, produced_<TYPE>          items produced
#   events_total, events_<TYPE>              expeditions claimed
#   great_total, great_<TYPE>, jackpot_total Great-or-better / Jackpot results
#   node_level_<TYPE>, node_level_max        highest exploration level reached
#   unique_discoveries, discoveries_<TYPE>   distinct resources discovered
#   workers_assigned_total                   worker assignments
#   fuse_success_total                       successful fuses
#   trades_completed                         protected trades settled
#   global_expedition_weeks                  distinct weeks committed
#   nodes_owned_max, production_types_distinct  territory size / variety
#   warehouse_withdrawals                    manual Warehouse withdrawals
#   expedition_team_max                      largest expedition team

